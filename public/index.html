<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a1a2e" />
  <title>Claude Voice Chat</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      margin: 0;
      padding: 0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 0.75rem 1rem;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    header h1 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 600;
      color: #e94560;
    }

    header span {
      font-size: 1.25rem;
    }

    #error-banner {
      background: #7f1d1d;
      color: #fca5a5;
      padding: 0.75rem 1rem;
      font-size: 0.875rem;
      display: none;
      flex-shrink: 0;
    }

    #conversation {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      -webkit-overflow-scrolling: touch;
    }

    #conversation:empty::after {
      content: "Tap the microphone to start a conversation";
      color: #555;
      font-size: 0.9rem;
      text-align: center;
      margin: auto;
      display: block;
    }

    .message {
      max-width: 85%;
      padding: 0.75rem 1rem;
      border-radius: 1.25rem;
      line-height: 1.5;
      word-break: break-word;
      font-size: 0.95rem;
    }

    .message.user {
      align-self: flex-end;
      background: #0f3460;
      border-bottom-right-radius: 0.3rem;
    }

    .message.assistant {
      align-self: flex-start;
      background: #16213e;
      border: 1px solid #0f3460;
      border-bottom-left-radius: 0.3rem;
    }

    .message .label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.25rem;
      opacity: 0.6;
    }

    #controls {
      padding: 1.25rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
      background: #16213e;
      border-top: 1px solid #0f3460;
    }

    #mic-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: none;
      background: #e94560;
      color: white;
      font-size: 1.75rem;
      cursor: pointer;
      touch-action: manipulation;
      transition: transform 0.1s ease, background 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(233, 69, 96, 0.4);
      -webkit-tap-highlight-color: transparent;
    }

    #mic-btn:active {
      transform: scale(0.92);
    }

    #mic-btn.listening {
      background: #c0392b;
      animation: pulse 1.2s ease-in-out infinite;
    }

    #mic-btn.speaking {
      background: #1a6b3a;
      box-shadow: 0 4px 12px rgba(26, 107, 58, 0.4);
    }

    #mic-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      animation: none;
    }

    @keyframes pulse {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(233, 69, 96, 0.5);
      }
      50% {
        box-shadow: 0 0 0 16px rgba(233, 69, 96, 0);
      }
    }

    #status {
      font-size: 0.8rem;
      color: #888;
      min-height: 1.2rem;
      text-align: center;
      letter-spacing: 0.02em;
    }

    #clear-btn {
      background: none;
      border: 1px solid #333;
      color: #666;
      font-size: 0.75rem;
      padding: 0.35rem 0.75rem;
      border-radius: 1rem;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    #clear-btn:active {
      background: #222;
    }
  </style>
</head>
<body>
  <header>
    <span>🎙️</span>
    <h1>Claude Voice Chat</h1>
  </header>
  <div id="error-banner"></div>
  <div id="conversation" aria-live="polite" aria-label="Conversation"></div>
  <div id="controls">
    <button id="mic-btn" aria-label="Tap to speak">🎤</button>
    <div id="status" aria-live="polite">Tap to speak</div>
    <button id="clear-btn" aria-label="Clear conversation">Clear conversation</button>
  </div>
  <script src="app.js"></script>
</body>
</html>
